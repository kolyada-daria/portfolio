site_name: Портфолио | Дарья Коляда
site_description: Персональный сайт с отчетами по лабораторным работам
site_author: Коляда Дарья

nav:
  - Главная: index.md
  - Лабораторные работы:
      - Обзор работ: labs/index.md
      - Лабораторная №1: labs/lab1.md
      - Лабораторная №2: labs/lab2.md
      - Лабораторная №3: labs/lab3.md
      - Лабораторная №4: labs/lab4.md
      - Лабораторная №5: labs/lab5.md
      - Лабораторная №6: labs/lab6.md
      - Лабораторная №7: labs/lab7.md
      - Лабораторная №8: labs/lab8.md
      - Лабораторная №9: labs/lab9.md
      - Лабораторная №10: labs/lab10.md
      - Лабораторная №11: labs/lab11.md
  - Об авторе: about.md

theme:
  name: material
  language: ru
#  features:
#    - navigation.tabs # Горизонтальное меню сверху

markdown_extensions:
  - admonition             # Цветные блоки
  - pymdownx.details       # Раскрывающиеся списки
  - pymdownx.superfences   # Для вложенности кода в спойлеры
  - pymdownx.arithmatex    # Для отображения математических формул
  - attr_list              # Управление оформлением
  - pymdownx.highlight:    # Подсветка кода
      pygments_lang_class: true  # Для раскраски кода
  - pymdownx.inlinehilite  # Подсветка кода внутри предложений


extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kolyada-daria